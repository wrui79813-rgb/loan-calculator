<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>全能私人借贷计算器 V2.1 | 多人账本</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--primary:#2c7a4b;--primary-dark:#1f5f3b;--primary-light:#e9f5ef;--bg:#f0f7f3;--card:#fff;--border:#e2efe9;--text:#1e2f2c;--muted:#4a6a5e;--danger:#b13e3e;--danger-bg:#fceaea;--r:16px;--rl:24px}
        body{background:var(--bg);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:var(--text);line-height:1.5}
        .app{max-width:1600px;margin:0 auto;padding:16px}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}
        .title{font-size:1.5rem;background:linear-gradient(135deg,#1f6e43,#2b8c5a);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
        .subtitle{font-size:.78rem;color:var(--muted)}
        .toolbar{display:flex;gap:8px;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:60px;border:1px solid var(--border);background:var(--card);font-size:.8rem;font-weight:500;cursor:pointer;transition:.15s;color:var(--text)}
        .btn:hover{background:var(--primary-light)}
        .btn-p{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
        .btn-p:hover{background:var(--primary-dark);transform:translateY(-1px)}
        .btn-d{background:var(--danger-bg);color:var(--danger);border-color:#e2b6b6}
        .btn-d:hover{background:#f5d6d6}
        .btn-sm{padding:4px 10px;font-size:.72rem}
        .btn-ghost{background:transparent;border:none;color:var(--muted);padding:2px 6px;cursor:pointer;font-size:.72rem}
        .btn-ghost:hover{color:var(--danger)}
        .ptabs{display:flex;align-items:center;gap:4px;margin-bottom:16px;background:var(--card);border-radius:var(--r);padding:6px;border:1px solid var(--border);flex-wrap:wrap;overflow-x:auto}
        .ptab{padding:7px 14px;border-radius:10px;cursor:pointer;font-size:.83rem;font-weight:500;transition:.15s;border:none;background:transparent;color:var(--muted)}
        .ptab:hover{background:var(--primary-light)}
        .ptab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(44,122,75,.2)}
        .ptab-add{padding:6px 12px;border-radius:10px;cursor:pointer;border:1px dashed #bdd9ce;background:transparent;color:var(--primary);font-size:.82rem}
        .ptab-add:hover{background:var(--primary-light)}
        .sbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
        .scard{background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border)}
        .scard .lb{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
        .scard .val{font-size:1.2rem;font-weight:700;color:var(--primary-dark)}
        .dash{display:flex;gap:18px;flex-wrap:wrap}
        .lpanel{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column;gap:14px}
        .rpanel{flex:2.5;min-width:380px}
        .card{background:var(--card);border-radius:var(--rl);border:1px solid var(--border);padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.02)}
        .card-t{font-size:.92rem;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
        .llist{max-height:55vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
        .litem{background:#fbfefc;border-radius:var(--r);padding:12px 14px;cursor:pointer;border:1px solid var(--border);transition:.15s;position:relative}
        .litem:hover{border-color:#a8d4be}
        .litem.active{background:var(--primary-light);border-left:4px solid var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.04)}
        .litem-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .litem-title{font-weight:700;font-size:.9rem}
        .litem-stats{font-size:.72rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
        .badge{font-size:.63rem;background:#e2ede7;padding:2px 7px;border-radius:20px}
        .badge-green{background:#d4edda;color:#155724;font-size:.72rem;padding:2px 8px;border-radius:20px;font-weight:600;margin-left:8px}
        .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
        .fd{display:flex;flex-direction:column;gap:4px}
        .fd label{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
        .fd input,.fd select{padding:8px 11px;border:1px solid #cee0d8;border-radius:11px;background:#fff;font-size:.86rem;transition:.2s;width:100%}
        .fd input:focus,.fd select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px #c7e0d4}
        .factions{margin-top:12px;display:flex;gap:8px}
        .mgroup{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
        .mchip{padding:5px 12px;border-radius:30px;border:1px solid #c0dbcf;background:#fff;cursor:pointer;font-size:.76rem;transition:.15s}
        .mchip:hover{background:var(--primary-light)}
        .mchip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .dtable{width:100%;border-collapse:collapse;font-size:.78rem}
        .dtable th{padding:9px 6px;text-align:left;border-bottom:2px solid var(--border);font-size:.7rem;color:var(--muted);text-transform:uppercase}
        .dtable td{padding:9px 6px;border-bottom:1px solid #f0f5f2}
        .dtable tr:hover td{background:#f8fcf9}
        .igrid{display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;font-size:.83rem}
        .igrid .ii{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #e8f0ec}
        .igrid .il{color:var(--muted);font-size:.75rem}
        .igrid .iv{font-weight:600}
        .empty{text-align:center;padding:50px 20px;color:#8fb3a4}
        .empty .ei{font-size:2.2rem;margin-bottom:10px}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:1000}
        .dialog{background:#fff;border-radius:var(--rl);padding:24px;max-width:340px;width:90%;text-align:center}
        .dialog h3{margin-bottom:10px}
        .dialog p{color:var(--muted);margin-bottom:18px;font-size:.88rem}
        .dialog .da{display:flex;gap:10px;justify-content:center}
        .inline-prompt{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:1001}
        .inline-prompt .ip-box{background:#fff;border-radius:var(--rl);padding:24px;max-width:360px;width:90%}
        .inline-prompt .ip-box h3{margin-bottom:12px;font-size:1rem}
        .inline-prompt .ip-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:12px;font-size:.9rem;margin-bottom:14px}
        .inline-prompt .ip-box .da{display:flex;gap:10px;justify-content:flex-end}
        .btn-add-loan{width:100%;padding:10px;border-radius:12px;border:1px dashed #bdd9ce;background:transparent;color:var(--primary);font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s}
        .btn-add-loan:hover{background:var(--primary-light);border-color:var(--primary)}
        .repay-toggle{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-size:.72rem;border-radius:20px;border:1px solid #d4a96e;background:#FEF7E0;color:#8b5e1e;cursor:pointer;font-weight:500;transition:.15s}
        .repay-toggle:hover{background:#fcefc5}
        .repay-section{background:#FEF7E0;border-radius:var(--r);padding:14px;margin-bottom:16px}
        .cleared-row td{background:#d4edda !important;text-align:center;font-weight:600;color:#155724;font-size:.85rem;padding:12px 6px}
        .status-tag{font-size:.72rem;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block}
        .status-clearing{background:#fff3cd;color:#856404}
        .status-cleared{background:#d4edda;color:#155724}
        .status-overpaid{background:#cce5ff;color:#004085}
        @media(max-width:900px){.lpanel{max-width:100%}.rpanel{min-width:100%}.dash{flex-direction:column}.igrid{grid-template-columns:1fr 1fr}}
        @media(max-width:500px){.app{padding:8px}.fgrid{grid-template-columns:1fr}.igrid{grid-template-columns:1fr}.sbar{grid-template-columns:1fr 1fr}}
        .llist::-webkit-scrollbar{width:5px}
        .llist::-webkit-scrollbar-thumb{background:#c0d9ce;border-radius:3px}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div><div class="title">📒 全能私人借贷计算器</div><div class="subtitle">多人账本 · 多还款模式 · 单利复利罚息 | 本地存储 隐私安全</div></div>
        <div class="toolbar">
            <button class="btn" onclick="exportExcel()">📎 导出Excel</button>
            <button class="btn" onclick="exportTxt()">📄 导出对账</button>
            <button class="btn" onclick="copySummary()">📋 复制汇总</button>
        </div>
    </div>
    <div class="ptabs" id="ptabs"></div>
    <div class="sbar" id="sbar"></div>
    <div class="dash">
        <div class="lpanel">
            <div class="card">
                <div class="card-t"><span>💰 借款列表</span><span class="badge" id="loanCnt">0笔</span></div>
                <div class="llist" id="llist"></div>
                <div style="margin-top:12px"><button class="btn-add-loan" onclick="showAddLoanForm()">+ 新增借款</button></div>
            </div>
        </div>
        <div class="rpanel"><div class="card" id="rpanel"><div class="empty"><div class="ei">👈</div><div>从左侧选择或新增一笔借款</div></div></div></div>
    </div>
</div>
<div id="overlay" class="overlay" style="display:none"><div class="dialog"><h3 id="dlgTitle"></h3><p id="dlgMsg"></p><div class="da"><button class="btn" id="dlgCancel">取消</button><button class="btn btn-d" id="dlgOk">确定</button></div></div></div>
<div id="promptOvl" class="inline-prompt" style="display:none"><div class="ip-box"><h3 id="promptTitle"></h3><input id="promptInput" placeholder=""><div class="da"><button class="btn" id="promptCancel">取消</button><button class="btn btn-p" id="promptOk">确定</button></div></div></div>

<script>
const SK="loan_calc_v2_data";
let D={persons:[],selPerson:null,selLoan:null};
let _showingAddForm=false;
let _showingRepayForm=false;
function save(){localStorage.setItem(SK,JSON.stringify(D))}
function gid(){return Date.now()+Math.floor(Math.random()*1e5)}
function esc(s){return s?s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])):''}
function today(){return new Date().toISOString().slice(0,10)}

function load(){
    const r=localStorage.getItem(SK);
    if(r){try{D=JSON.parse(r)}catch(e){D={persons:[],selPerson:null,selLoan:null}}}
    if(!D.persons){
        const ol=localStorage.getItem("private_loan_app_loans");
        const or=localStorage.getItem("private_loan_app_repayments");
        D={persons:[],selPerson:null,selLoan:null};
        if(ol){
            const ls=JSON.parse(ol),rs=or?JSON.parse(or):[];
            if(ls.length){const p={id:gid(),name:"默认账本",loans:ls,repayments:rs};D.persons.push(p);D.selPerson=p.id;}
        }
    }
    if(!D.persons.length){
        const pid=gid(),lid=gid();
        D.persons.push({id:pid,name:"示例账本",loans:[{id:lid,borrower:"张三（装修借款）",principal:50000,annualRate:6.5,startDate:"2025-01-10",dueDate:"2025-12-31",penaltyRate:3,interestType:"simple",repaymentMethod:"先息后本"}],repayments:[{id:gid(),loanId:lid,date:"2025-03-15",amount:1250,principalPaid:0,interestPaid:1250,modeDesc:"只还息"}]});
        D.selPerson=pid;
    }
    if(!D.selPerson&&D.persons.length)D.selPerson=D.persons[0].id;
    save();
}

function curPerson(){return D.persons.find(p=>p.id===D.selPerson)||null}

// === Interest Calculation (FIXED in V2.1) ===
function calcInt(loan,from,to,principal){
    if(principal<=0||from>=to)return{normal:0,penalty:0,total:0};
    const s=new Date(from),e=new Date(to),d=new Date(loan.dueDate);
    const ar=loan.annualRate/100,pr=(loan.penaltyRate||0)/100,ic=loan.interestType==='compound';
    let normalDays=0,overdueDays=0;
    if(e<=d){
        normalDays=Math.ceil((e-s)/864e5);
    } else if(s>=d){
        overdueDays=Math.ceil((e-s)/864e5);
    } else {
        normalDays=Math.ceil((d-s)/864e5);
        overdueDays=Math.ceil((e-d)/864e5);
    }
    let ni=0,pi=0;
    if(normalDays>0&&ar>0){
        ni=ic?principal*(Math.pow(1+ar/365,normalDays)-1):principal*ar*normalDays/365;
    }
    if(overdueDays>0){
        if(ar>0){
            ni+=ic?principal*(Math.pow(1+ar/365,overdueDays)-1):principal*ar*overdueDays/365;
        }
        if(pr>0){
            pi=ic?principal*(Math.pow(1+pr/365,overdueDays)-1):principal*pr*overdueDays/365;
        }
    }
    return{normal:ni,penalty:pi,total:ni+pi};
}

function loanState(person,lid){
    const loan=person.loans.find(l=>l.id===lid);
    if(!loan)return null;
    let recs=person.repayments.filter(r=>r.loanId===lid).sort((a,b)=>new Date(a.date)-new Date(b.date));
    let rp=loan.principal,tpi=0,tpp=0,ld=loan.startDate;
    for(let r of recs){tpi+=r.interestPaid;tpp+=r.principalPaid;rp-=r.principalPaid;if(rp<0)rp=0;ld=r.date}
    return{rp,tpi,tpp,ld,recs,loan};
}

// V2.1 FIX: Calculate pending interest from last repayment date (or start date) to today
function getPendingInterest(loan, st){
    if(st.rp<=0) return 0;
    const seg=calcInt(loan, st.ld, today(), st.rp);
    return seg.total;
}

function getRepaymentStatus(loan, st){
    const pending = getPendingInterest(loan, st);
    if(st.rp <= 0 && pending <= 0) return {label:'✅ 已还清', cls:'status-cleared'};
    const totalPaidBack = st.tpi + st.tpp;
    const totalExpected = loan.principal + calcInt(loan, loan.startDate, today(), loan.principal).total;
    if(totalPaidBack > totalExpected + 0.01) return {label:'💰 多还', cls:'status-overpaid'};
    return {label:'⏳ 还款中', cls:'status-clearing'};
}

function doRepay(person,lid,date,amt,mode,mp=0,mi=0){
    const loan=person.loans.find(l=>l.id===lid);
    if(!loan)return{ok:false,msg:"借款不存在"};
    const st=loanState(person,lid);
    let rp=st.rp;
    if(rp<=0&&amt>0)return{ok:false,msg:"本金已结清"};
    const seg=calcInt(loan,st.ld,date,rp);
    let due=seg.total,ap=0,ai=0;
    if(mode==='interestOnly'){
        if(amt>due+0.01)return{ok:false,msg:"只还息不能超过应付利息 ¥"+due.toFixed(2)};
        ai=amt;
    }else if(mode==='principalOnly'){
        if(amt>rp+0.01)return{ok:false,msg:"超出剩余本金"};
        ap=amt;
    }else if(mode==='auto'){
        if(amt<=due){ai=amt}else{ai=due;ap=Math.min(amt-due,rp)}
    }else if(mode==='manual'){
        if(Math.abs(mp+mi-amt)>0.01)return{ok:false,msg:"本息之和≠还款金额"};
        if(mp>rp+0.01)return{ok:false,msg:"还本超出剩余本金"};
        ap=mp;ai=mi;
    }else return{ok:false,msg:"未知模式"};
    person.repayments.push({id:gid(),loanId:lid,date,amount:amt,principalPaid:ap,interestPaid:ai,modeDesc:mode});
    save();return{ok:true};
}

// === UI ===
function render(){renderTabs();renderSummary();renderLoans();renderRight()}

function renderTabs(){
    const c=document.getElementById('ptabs');
    let h=`<button class="ptab ${!D.selPerson?'active':''}" onclick="selPerson(null)">📊 所有人汇总</button>`;
    D.persons.forEach(p=>{
        h+=`<button class="ptab ${D.selPerson===p.id?'active':''}" onclick="selPerson(${p.id})">${esc(p.name)} <span class="btn-ghost" onclick="event.stopPropagation();delPerson(${p.id})" title="删除">✕</span></button>`;
    });
    h+=`<button class="ptab-add" onclick="addPerson()">+ 新增人员</button>`;
    c.innerHTML=h;
}

function renderSummary(){
    const c=document.getElementById('sbar');
    let loans,repays;
    if(!D.selPerson){loans=D.persons.flatMap(p=>p.loans);repays=D.persons.flatMap(p=>p.repayments)}
    else{const p=curPerson();loans=p?p.loans:[];repays=p?p.repayments:[]}
    let totalP=0,totalRepaid=0,totalRepCnt=repays.length,remainP=0,pendingInt=0;
    loans.forEach(l=>{
        totalP+=l.principal;
        const person=D.persons.find(pp=>pp.loans.includes(l));
        if(person){
            const st=loanState(person,l.id);
            remainP+=st.rp;
            totalRepaid+=st.tpi+st.tpp;
            pendingInt+=getPendingInterest(l, st);
        }
    });
    c.innerHTML=`
        <div class="scard"><div class="lb">总借款笔数</div><div class="val">${loans.length}</div></div>
        <div class="scard"><div class="lb">总借款金额</div><div class="val">¥${fmt(totalP)}</div></div>
        <div class="scard"><div class="lb">总还款金额</div><div class="val">¥${fmt(totalRepaid)}</div></div>
        <div class="scard"><div class="lb">总还款次数</div><div class="val">${totalRepCnt}</div></div>
        <div class="scard"><div class="lb">剩余本金合计</div><div class="val">¥${fmt(remainP)}</div></div>
        <div class="scard"><div class="lb">待还利息合计</div><div class="val">¥${fmt(pendingInt)}</div></div>
        <div class="scard"><div class="lb">本息合计(待还)</div><div class="val">¥${fmt(remainP+pendingInt)}</div></div>
    `;
}

function renderLoans(){
    const c=document.getElementById('llist');
    const cnt=document.getElementById('loanCnt');
    if(!D.selPerson){c.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)">请选择具体人员查看借款列表</div>';cnt.textContent='';return}
    const p=curPerson();
    if(!p){c.innerHTML='';cnt.textContent='0笔';return}
    cnt.textContent=p.loans.length+'笔';
    if(!p.loans.length){c.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)">暂无借款，点击下方按钮新增</div>';return}
    c.innerHTML=p.loans.map(l=>{
        const st=loanState(p,l.id);
        const active=D.selLoan===l.id?'active':'';
        return`<div class="litem ${active}" onclick="selLoan(${l.id})">
            <div class="litem-h"><span class="litem-title">🏷️ ${esc(l.borrower)}</span><span style="display:flex;gap:4px"><span class="badge">${l.repaymentMethod||'灵活'}</span><span class="btn-ghost" onclick="event.stopPropagation();editLoan(${l.id})" title="编辑">✏️</span><span class="btn-ghost" onclick="event.stopPropagation();delLoan(${l.id})" title="删除">🗑️</span></span></div>
            <div class="litem-stats"><span>本金 ¥${fmt(l.principal)}</span><span>剩余 ¥${fmt(st.rp)}</span><span>${l.annualRate}% ${l.interestType==='compound'?'复利':'单利'}</span></div>
        </div>`;
    }).join('');
}

function renderRight(){
    const c=document.getElementById('rpanel');
    if(_showingAddForm){
        renderAddForm();
        return;
    }
    if(!D.selPerson||!D.selLoan){c.innerHTML='<div class="empty"><div class="ei">👈</div><div>从左侧选择或新增一笔借款</div></div>';return}
    const p=curPerson();if(!p){c.innerHTML='';return}
    const loan=p.loans.find(l=>l.id===D.selLoan);
    if(!loan){c.innerHTML='<div class="empty">借款不存在</div>';D.selLoan=null;return}
    const st=loanState(p,D.selLoan);
    const pending=getPendingInterest(loan, st);
    const status=getRepaymentStatus(loan, st);
    const isCleared = st.rp <= 0 && pending <= 0;

    let h=`<div class="card-t"><span>📌 ${esc(loan.borrower)}${isCleared?' <span class="badge-green">已还清</span>':''}</span><button class="btn btn-sm" onclick="copyLoanDetail(${loan.id})">📋 复制明细</button></div>
    <div style="background:#f2f9f5;border-radius:var(--r);padding:14px;margin-bottom:16px">
        <div class="igrid">
            <div class="ii"><span class="il">💰 本金</span><span class="iv">¥${fmt(loan.principal)}</span></div>
            <div class="ii"><span class="il">⚡ 年利率</span><span class="iv">${loan.annualRate}%</span></div>
            <div class="ii"><span class="il">📅 借款日</span><span class="iv">${loan.startDate}</span></div>
            <div class="ii"><span class="il">⚠️ 到期日</span><span class="iv">${loan.dueDate}</span></div>
            <div class="ii"><span class="il">🔥 罚息率</span><span class="iv">${loan.penaltyRate}%</span></div>
            <div class="ii"><span class="il">🧮 计息</span><span class="iv">${loan.interestType==='compound'?'复利(日复利)':'单利'}</span></div>
            <div class="ii"><span class="il">🏦 剩余本金</span><span class="iv" style="color:var(--primary)">¥${fmt(st.rp)}</span></div>
            <div class="ii"><span class="il">💸 已还利息</span><span class="iv">¥${fmt(st.tpi)}</span></div>
            <div class="ii"><span class="il">💸 已还本金</span><span class="iv">¥${fmt(st.tpp)}</span></div>
            <div class="ii"><span class="il">⏳ 待还利息</span><span class="iv" style="color:#c26b2e">¥${fmt(pending)}</span></div>
            <div class="ii"><span class="il">📊 还款状态</span><span class="iv"><span class="status-tag ${status.cls}">${status.label}</span></span></div>
            <div class="ii"><span class="il">🔄 还款方式</span><span class="iv">${loan.repaymentMethod||'灵活'}</span></div>
        </div>
    </div>`;

    // Repay section - collapsible (修改点3)
    h+=`<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <strong>🧾 还款操作</strong>
        <button class="repay-toggle" onclick="toggleRepayForm()">+ 新增还款记录</button>
    </div>`;
    h+=`<div id="repayFormSection" class="repay-section" style="display:${_showingRepayForm?'block':'none'}">
        <div class="mgroup" id="modeGrp">
            <span class="mchip active" data-m="auto">自动抵扣</span>
            <span class="mchip" data-m="interestOnly">只还息</span>
            <span class="mchip" data-m="principalOnly">只还本</span>
            <span class="mchip" data-m="manual">手动拆分</span>
        </div>
        <div class="fgrid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">
            <div class="fd"><label>还款日期</label><input type="date" id="rDate" value="${today()}"></div>
            <div class="fd"><label>还款金额(¥)</label><input type="number" id="rAmt" step="0.01" placeholder="0.00"></div>
            <div class="fd" id="mpFd" style="display:none"><label>还本金额</label><input type="number" id="rMP" step="0.01" value="0"></div>
            <div class="fd" id="miFd" style="display:none"><label>还息金额</label><input type="number" id="rMI" step="0.01" value="0"></div>
        </div>
        <div class="factions"><button class="btn btn-p" onclick="submitRepay()">确认还款</button><button class="btn" onclick="toggleRepayForm()">收起</button></div>
    </div>`;

    // Repayment history (修改点5)
    h+=`<div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><strong>📜 还款流水</strong><span class="badge">${st.recs.length}条</span></div>
    <table class="dtable"><thead><tr><th>日期</th><th>金额</th><th>还本</th><th>还息</th><th>模式</th><th>操作</th></tr></thead><tbody>`;
    if(!st.recs.length)h+=`<tr><td colspan="6" style="text-align:center;color:var(--muted)">暂无还款记录</td></tr>`;
    else{
        [...st.recs].reverse().forEach(r=>{
            h+=`<tr><td>${r.date}</td><td>¥${fmt(r.amount)}</td><td>¥${fmt(r.principalPaid)}</td><td>¥${fmt(r.interestPaid)}</td><td>${modeLabel(r.modeDesc)}</td><td><button class="btn-ghost" onclick="delRepay(${r.id})">🗑️撤销</button></td></tr>`;
        });
        if(isCleared){
            h+=`<tr class="cleared-row"><td colspan="6">✅ 该笔借款已还清</td></tr>`;
        }
    }
    h+=`</tbody></table>`;
    c.innerHTML=h;
    // bind mode chips
    bindModeChips();
}

function bindModeChips(){
    document.querySelectorAll('#modeGrp .mchip').forEach(ch=>{
        ch.onclick=()=>{
            document.querySelectorAll('#modeGrp .mchip').forEach(x=>x.classList.remove('active'));
            ch.classList.add('active');
            const m=ch.dataset.m;
            document.getElementById('mpFd').style.display=m==='manual'?'':'none';
            document.getElementById('miFd').style.display=m==='manual'?'':'none';
        };
    });
}

function toggleRepayForm(){
    _showingRepayForm=!_showingRepayForm;
    const sec=document.getElementById('repayFormSection');
    if(sec) sec.style.display=_showingRepayForm?'block':'none';
}

// 修改点1: Add loan form in right panel
function showAddLoanForm(){
    if(!D.selPerson){alert('请先选择一个人员账本');return}
    _showingAddForm=true;
    D.selLoan=null;
    renderLoans();
    renderRight();
}

function renderAddForm(){
    const c=document.getElementById('rpanel');
    const dy=new Date();dy.setFullYear(dy.getFullYear()+1);
    c.innerHTML=`<div class="card-t"><span>➕ 新增借款</span></div>
    <div class="fgrid">
        <div class="fd"><label>借款人/用途</label><input id="nBorrower" placeholder="如：张三装修"></div>
        <div class="fd"><label>本金(¥)</label><input type="number" id="nPrincipal" step="0.01" placeholder="50000"></div>
        <div class="fd"><label>年利率(%)</label><input type="number" id="nRate" step="0.01" value="5"></div>
        <div class="fd"><label>借款日期</label><input type="date" id="nStart" value="${today()}"></div>
        <div class="fd"><label>到期日</label><input type="date" id="nDue" value="${dy.toISOString().slice(0,10)}"></div>
        <div class="fd"><label>逾期罚息率(%)</label><input type="number" id="nPenalty" step="0.01" value="2"></div>
        <div class="fd"><label>计息方式</label><select id="nIntType"><option value="simple">单利</option><option value="compound">复利(日复利)</option></select></div>
        <div class="fd"><label>还款方式</label><select id="nRepay"><option value="先息后本">先息后本</option><option value="等额本息">等额本息</option><option value="随借随还">随借随还</option><option value="自定义">自定义</option></select></div>
    </div>
    <div class="factions">
        <button class="btn btn-p" onclick="saveLoan()">保存借款</button>
        <button class="btn" onclick="cancelAddForm()">取消</button>
    </div>`;
}

function cancelAddForm(){
    _showingAddForm=false;
    renderRight();
}

function modeLabel(m){return{'auto':'自动抵扣','interestOnly':'只还息','principalOnly':'只还本','manual':'手动拆分'}[m]||m}
function fmt(n){return(n||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}

// === Actions ===
function selPerson(id){D.selPerson=id;D.selLoan=null;_showingAddForm=false;save();render()}
function selLoan(id){D.selLoan=id;_showingAddForm=false;_showingRepayForm=false;save();renderLoans();renderRight()}

function addPerson(){
    showPrompt('新增人员','请输入人员名称',name=>{
        if(!name.trim())return;
        const np={id:gid(),name:name.trim(),loans:[],repayments:[]};
        D.persons.push(np);D.selPerson=np.id;D.selLoan=null;save();render();
    });
}
function delPerson(id){
    const p=D.persons.find(x=>x.id===id);
    showConfirm('删除「'+p.name+'」','该人员下所有借款和还款记录将永久删除，确定？',()=>{
        D.persons=D.persons.filter(x=>x.id!==id);
        if(D.selPerson===id){D.selPerson=D.persons[0]?.id||null;D.selLoan=null}
        save();render();
    });
}

function saveLoan(){
    if(!D.selPerson){alert('请先选择一个人员账本');return}
    const p=curPerson();if(!p)return;
    const b=document.getElementById('nBorrower').value.trim();
    const pr=parseFloat(document.getElementById('nPrincipal').value);
    const rt=parseFloat(document.getElementById('nRate').value);
    const sd=document.getElementById('nStart').value;
    const dd=document.getElementById('nDue').value;
    const pn=parseFloat(document.getElementById('nPenalty').value)||0;
    const it=document.getElementById('nIntType').value;
    const rm=document.getElementById('nRepay').value;
    if(!b){alert('请填写借款人');return}
    if(isNaN(pr)||pr<=0){alert('请填写有效本金');return}
    if(isNaN(rt)){alert('请填写利率');return}
    if(!sd){alert('请填写借款日期');return}
    if(!dd){alert('请填写到期日');return}
    const lid=gid();
    p.loans.push({id:lid,borrower:b,principal:pr,annualRate:rt,startDate:sd,dueDate:dd,penaltyRate:pn,interestType:it,repaymentMethod:rm});
    D.selLoan=lid;_showingAddForm=false;save();render();
}

function editLoan(lid){
    const p=curPerson();if(!p)return;
    const loan=p.loans.find(l=>l.id===lid);if(!loan)return;
    D.selLoan=lid;_showingAddForm=false;
    const c=document.getElementById('rpanel');
    c.innerHTML=`<div class="card-t"><span>✏️ 编辑借款</span></div>
    <div class="fgrid">
        <div class="fd"><label>借款人/用途</label><input id="eBorrower" value="${esc(loan.borrower)}"></div>
        <div class="fd"><label>本金(¥)</label><input type="number" id="ePrincipal" step="0.01" value="${loan.principal}"></div>
        <div class="fd"><label>年利率(%)</label><input type="number" id="eRate" step="0.01" value="${loan.annualRate}"></div>
        <div class="fd"><label>借款日期</label><input type="date" id="eStart" value="${loan.startDate}"></div>
        <div class="fd"><label>到期日</label><input type="date" id="eDue" value="${loan.dueDate}"></div>
        <div class="fd"><label>逾期罚息率(%)</label><input type="number" id="ePenalty" step="0.01" value="${loan.penaltyRate}"></div>
        <div class="fd"><label>计息方式</label><select id="eIntType"><option value="simple" ${loan.interestType==='simple'?'selected':''}>单利</option><option value="compound" ${loan.interestType==='compound'?'selected':''}>复利</option></select></div>
        <div class="fd"><label>还款方式</label><select id="eRepay"><option ${loan.repaymentMethod==='先息后本'?'selected':''}>先息后本</option><option ${loan.repaymentMethod==='等额本息'?'selected':''}>等额本息</option><option ${loan.repaymentMethod==='随借随还'?'selected':''}>随借随还</option><option ${loan.repaymentMethod==='自定义'?'selected':''}>自定义</option></select></div>
    </div>
    <div class="factions"><button class="btn btn-p" onclick="saveEdit(${lid})">保存修改</button><button class="btn" onclick="renderRight()">取消</button></div>`;
}

function saveEdit(lid){
    const p=curPerson();if(!p)return;
    const loan=p.loans.find(l=>l.id===lid);if(!loan)return;
    loan.borrower=document.getElementById('eBorrower').value.trim()||loan.borrower;
    loan.principal=parseFloat(document.getElementById('ePrincipal').value)||loan.principal;
    loan.annualRate=parseFloat(document.getElementById('eRate').value);
    loan.startDate=document.getElementById('eStart').value||loan.startDate;
    loan.dueDate=document.getElementById('eDue').value||loan.dueDate;
    loan.penaltyRate=parseFloat(document.getElementById('ePenalty').value)||0;
    loan.interestType=document.getElementById('eIntType').value;
    loan.repaymentMethod=document.getElementById('eRepay').value;
    save();render();
}

function delLoan(lid){
    showConfirm('删除借款','删除后相关还款记录也会删除，确定？',()=>{
        const p=curPerson();if(!p)return;
        p.loans=p.loans.filter(l=>l.id!==lid);
        p.repayments=p.repayments.filter(r=>r.loanId!==lid);
        if(D.selLoan===lid)D.selLoan=null;
        save();render();
    });
}

function submitRepay(){
    const p=curPerson();if(!p||!D.selLoan)return;
    const date=document.getElementById('rDate').value;
    const amt=parseFloat(document.getElementById('rAmt').value);
    if(!date||isNaN(amt)||amt<=0){alert('请填写有效日期和金额');return}
    const activeMode=document.querySelector('#modeGrp .mchip.active');
    const mode=activeMode?activeMode.dataset.m:'auto';
    let mp=0,mi=0;
    if(mode==='manual'){mp=parseFloat(document.getElementById('rMP').value)||0;mi=parseFloat(document.getElementById('rMI').value)||0}
    const res=doRepay(p,D.selLoan,date,amt,mode,mp,mi);
    if(res.ok){_showingRepayForm=false;render()}else{alert(res.msg)}
}

function delRepay(rid){
    showConfirm('撤销还款','撤销后账目将回滚，确定？',()=>{
        const p=curPerson();if(!p)return;
        p.repayments=p.repayments.filter(r=>r.id!==rid);
        save();render();
    });
}

function copyLoanDetail(lid){
    const p=curPerson();if(!p)return;
    const st=loanState(p,lid);if(!st)return;
    const pending=getPendingInterest(st.loan, st);
    let t=`【借款】${st.loan.borrower}\n本金：¥${st.loan.principal} 利率：${st.loan.annualRate}%\n剩余本金：¥${st.rp.toFixed(2)} 已还利息：¥${st.tpi.toFixed(2)} 待还利息：¥${pending.toFixed(2)}\n还款记录：\n`;
    st.recs.forEach(r=>{t+=`  ${r.date} 还款¥${r.amount.toFixed(2)} (本¥${r.principalPaid.toFixed(2)} 息¥${r.interestPaid.toFixed(2)}) ${modeLabel(r.modeDesc)}\n`});
    navigator.clipboard.writeText(t).then(()=>alert('已复制'));
}

// === Export ===
function exportExcel(){
    let rows=[["人员","借款ID","借款人","本金","年利率%","借款日","到期日","剩余本金","已还利息","罚息率","计息方式"]];
    D.persons.forEach(p=>{p.loans.forEach(l=>{const st=loanState(p,l.id);rows.push([p.name,l.id,l.borrower,l.principal,l.annualRate,l.startDate,l.dueDate,st.rp,st.tpi,l.penaltyRate,l.interestType])})});
    rows.push([],["还款流水"]);
    rows.push(["人员","记录ID","借款ID","还款日","金额","还本","还息","模式"]);
    D.persons.forEach(p=>{p.repayments.forEach(r=>rows.push([p.name,r.id,r.loanId,r.date,r.amount,r.principalPaid,r.interestPaid,r.modeDesc]))});
    const ws=XLSX.utils.aoa_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"借贷台账");
    XLSX.writeFile(wb,`借贷台账_${today()}.xlsx`);
}

function exportTxt(){
    let t="==== 全能借贷对账 ====\n";
    D.persons.forEach(p=>{
        t+=`\n【${p.name}】\n`;
        p.loans.forEach(l=>{
            const st=loanState(p,l.id);
            t+=`  📌 ${l.borrower} 本金:${l.principal} 剩余:${st.rp.toFixed(2)} 已还利息:${st.tpi.toFixed(2)}\n`;
            st.recs.forEach(r=>t+=`    ${r.date} +${r.amount} (本${r.principalPaid} 息${r.interestPaid})\n`);
        });
    });
    const blob=new Blob([t],{type:"text/plain"});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`借贷对账_${today()}.txt`;a.click();URL.revokeObjectURL(a.href);
}

function copySummary(){
    let s="📊 借款汇总\n";
    D.persons.forEach(p=>{
        s+=`\n【${p.name}】\n`;
        p.loans.forEach(l=>{const st=loanState(p,l.id);s+=`  ${l.borrower}: 剩余¥${st.rp.toFixed(2)} 已还利息¥${st.tpi.toFixed(2)}\n`});
    });
    navigator.clipboard.writeText(s).then(()=>alert('已复制汇总'));
}

// === Dialogs ===
let _confirmCb=null;
function showConfirm(title,msg,cb){
    document.getElementById('dlgTitle').textContent=title;
    document.getElementById('dlgMsg').textContent=msg;
    document.getElementById('overlay').style.display='flex';
    _confirmCb=cb;
}
document.getElementById('dlgCancel').onclick=()=>{document.getElementById('overlay').style.display='none';_confirmCb=null}
document.getElementById('dlgOk').onclick=()=>{document.getElementById('overlay').style.display='none';if(_confirmCb)_confirmCb();_confirmCb=null}

let _promptCb=null;
function showPrompt(title,placeholder,cb){
    document.getElementById('promptTitle').textContent=title;
    document.getElementById('promptInput').placeholder=placeholder||'';
    document.getElementById('promptInput').value='';
    document.getElementById('promptOvl').style.display='flex';
    document.getElementById('promptInput').focus();
    _promptCb=cb;
}
document.getElementById('promptCancel').onclick=()=>{document.getElementById('promptOvl').style.display='none';_promptCb=null}
document.getElementById('promptOk').onclick=()=>{
    const v=document.getElementById('promptInput').value;
    document.getElementById('promptOvl').style.display='none';
    if(_promptCb)_promptCb(v);_promptCb=null;
}
document.getElementById('promptInput').onkeydown=(e)=>{if(e.key==='Enter')document.getElementById('promptOk').click()}

// === Init ===
function init(){
    load();
    render();
}
init();
</script>
</body>
</html>
